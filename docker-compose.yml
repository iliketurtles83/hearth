services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # open-webui is out of Phase 0b scope — it remains on :3000 (plain HTTP).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  backend:
    build: ./backend
    container_name: assistant-backend
    restart: unless-stopped
    # Port 8000 is NOT published to the host — all browser traffic enters via
    # Caddy (HTTPS). The backend is reachable inside the Docker network only.
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - ollama
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Caddy terminates TLS on the LAN edge and reverse-proxies to the backend.
  # Certificates are generated with mkcert and mounted read-only.
  # See README — HTTPS Setup section for cert generation steps.
  caddy:
    image: caddy:2-alpine
    container_name: assistant-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/certs:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ollama:
  open-webui: