services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # open-webui is out of Phase 0b scope — it remains on :3000 (plain HTTP).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  # MPD — music playback daemon (Phase 8).
  # Audio output: PulseAudio socket mounted from the host (PipeWire-PA compatible).
  # Music files: ${MUSIC_PATH} (set in .env) mounted read-only at /music.
  # If your UID is not 1000, update mpd/mpd.conf and the socket path below.
  mpd:
    image: vimagick/mpd
    container_name: assistant-mpd
    restart: unless-stopped
    command: ["mpd", "--stdout", "--no-daemon", "/config/mpd.conf"]
    # Keep MPD's control port internal to the compose network (use `expose`) to
    # avoid conflicts with any host MPD instance. Expose the web/HTTP port if
    # you want web access on the host.
    expose:
      - "6600"
    ports:
      - "8800:8800"
    volumes:
      - ./mpd:/config
      - ${MUSIC_PATH:-/media/jack/buffer/audio}:/music:ro
      - ./mpd/playlists:/config/playlists
      # PulseAudio socket for host user (PipeWire-pulse compatibility)
      - /run/user/1000/pulse/native:/run/user/1000/pulse/native:ro
    devices:
      - /dev/snd
    environment:
      - TZ=UTC
      - PUID=1000
      - PGID=1000
      - XDG_RUNTIME_DIR=/run/user/1000
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    healthcheck:
      test: ["CMD-SHELL", "mpc status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build: ./backend
    container_name: assistant-backend
    restart: unless-stopped
    # Port 8000 is NOT published to the host — all browser traffic enters via
    # Caddy (HTTPS). The backend is reachable inside the Docker network only.
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      # Strawberry DB mounted from host (read-only). Override STRAWBERRY_DB_PATH in
      # .env if the DB filename differs. Host directory set via STRAWBERRY_DB_DIR.
      - STRAWBERRY_DB_PATH=/strawberry/strawberry.db
      - MPD_HOST=mpd
      - TTS_ENGINE=${TTS_ENGINE:-kokoro}
      - TTS_KOKORO_MODEL=${TTS_KOKORO_MODEL:-/app/models/tts/kokoro-v1.0.int8.onnx}
      - TTS_KOKORO_VOICES=${TTS_KOKORO_VOICES:-/app/models/tts/voices-v1.0.bin}
      - TTS_KOKORO_VOICE=${TTS_KOKORO_VOICE:-af_heart}
      - TTS_KOKORO_LANG=${TTS_KOKORO_LANG:-en-us}
      - TTS_KOKORO_SPEED=${TTS_KOKORO_SPEED:-1.0}
    depends_on:
      - ollama
      - mpd
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      # Strawberry music library DB — mounted read-only so the backend can search it.
      # Set STRAWBERRY_DB_DIR in .env to the directory containing strawberry.db.
      - ${STRAWBERRY_DB_DIR:-/home/jack/.var/app/org.strawberrymusicplayer.strawberry/data/strawberry/strawberry}:/strawberry:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Caddy terminates TLS on the LAN edge and reverse-proxies to the backend.
  # Certificates are generated with mkcert and mounted read-only.
  # See README — HTTPS Setup section for cert generation steps.
  caddy:
    image: caddy:2-alpine
    container_name: assistant-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/certs:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  ollama:
  open-webui:
