<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/auth.js" type="module"></script>
</head>
<body>
  <!-- Login overlay — shown before auth is established -->
  <div id="login-overlay" style="display:none">
    <div id="login-card">
      <h2>Assistant</h2>
      <div id="login-tabs">
        <button id="tab-login" class="tab-btn active">Sign in</button>
        <button id="tab-register" class="tab-btn">Register</button>
      </div>

      <form id="login-form">
        <input id="login-username" type="text" placeholder="Username" autocomplete="username" required />
        <input id="login-password" type="password" placeholder="Password" autocomplete="current-password" required />
        <label class="checkbox-row">
          <input id="login-persistent" type="checkbox" />
          Stay signed in for 30 days
        </label>
        <button type="submit" class="primary-btn">Sign in</button>
      </form>

      <form id="register-form" style="display:none">
        <input id="reg-username" type="text" placeholder="Choose a username" autocomplete="username" required />
        <input id="reg-password" type="password" placeholder="Choose a password (8+ chars)" autocomplete="new-password" required />
        <label class="checkbox-row">
          <input id="reg-persistent" type="checkbox" />
          Stay signed in for 30 days
        </label>
        <button type="submit" class="primary-btn">Create account</button>
      </form>

      <p id="login-error" class="form-error"></p>
    </div>
  </div>
 <div id="app-shell">
    <button id="sidebar-toggle-btn" title="Toggle sidebar" aria-label="Toggle sidebar" aria-expanded="false">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div id="sidebar-with-chat">
    <aside id="sidebar">
      <div id="sidebar-branding">
        <span id="sidebar-brand-name">Hearth</span>
        <div id="tts-controls" title="Voice playback status">
          <button id="tts-enable-btn" type="button" style="display:none">Enable Voice</button>
          <button id="tts-stop-btn" type="button" style="display:none">Stop</button>
        </div>
      </div>
      <div id="sidebar-main">
        <section class="panel" id="sessions-panel">
          <div class="panel-header">
            <h2>Sessions</h2>
            <button id="session-new-btn" class="panel-btn" title="Create a new session">New</button>
          </div>
          <div id="session-list" class="list"></div>
        </section>

        <!-- Music panel (Phase 8): now-playing + queue -->
        <section class="panel" id="music-panel">
          <div class="panel-header">
            <h2>Music</h2>
            <div class="panel-header-actions">
              <span id="music-collapsed-now-playing" class="collapsed-now-playing now-playing-idle" aria-live="polite">Nothing playing</span>
              <div class="music-controls" id="music-controls">
                <button id="music-prev-btn" class="panel-btn" title="Previous / Restart">&#9664;&#9664;</button>
                <button id="music-play-pause-btn" class="panel-btn" title="Play / Pause">&#9654;</button>
                <button id="music-next-btn" class="panel-btn" title="Next track">&#9654;&#9654;</button>
                <button id="music-stop-btn" class="panel-btn" title="Stop">&#9632;</button>
              </div>
              <button id="music-collapse-btn" class="panel-btn collapse-btn" title="Collapse music section" aria-expanded="true" aria-controls="music-panel-body">▾</button>
            </div>
          </div>
          <div id="music-panel-body" class="panel-body">
            <div id="now-playing-bar">
              <span id="now-playing-label" class="now-playing-idle">Nothing playing</span>
            </div>
            <div id="music-volume-row">
              <label for="music-volume" id="music-volume-label">Volume</label>
              <input id="music-volume" type="range" min="0" max="100" step="1" value="60" />
              <span id="music-volume-value">60%</span>
            </div>
            <div class="queue-header">Queue</div>
            <div id="queue-list" class="list"></div>
          </div>
        </section>

        <section class="panel is-collapsed" id="memory-panel">
          <div class="panel-header">
            <h2>Memory</h2>
            <div class="panel-header-actions">
              <button id="memory-clear-btn" class="panel-btn danger" title="Clear all memory">Clear</button>
              <button id="memory-collapse-btn" class="panel-btn collapse-btn" title="Expand memory section" aria-expanded="false" aria-controls="memory-panel-body">▸</button>
            </div>
          </div>
          <div id="memory-panel-body" class="panel-body">
            <div id="memory-list" class="list"></div>
          </div>
        </section>
      </div>

      <div id="sidebar-account">
        <div id="sidebar-account-meta">
          <span id="auth-username" title="Logged-in user"></span>
          <span id="sidebar-account-status">Signed in</span>
        </div>
        <button id="logout-btn" class="panel-btn" title="Sign out">Sign out</button>
      </div>
    </aside>

    <div id="chat-column">
      <button id="mic-btn" title="Toggle voice (say &quot;Computer,&quot; to activate)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div id="messages">
        <div id="messages-inner">
          <div id="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.4"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Start a conversation</span>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div id="image-preview-strip" style="display:none">
          <div id="image-preview-inner">
            <img id="image-preview-thumb" alt="Attached image" />
            <button id="image-clear-btn" title="Remove image" type="button">&times;</button>
          </div>
        </div>
        <div id="input-inner">
          <!-- Phase 14: hidden file picker + attach button -->
          <input id="image-upload" type="file" accept="image/png,image/jpeg,image/webp" style="display:none" />
          <button id="image-attach-btn" type="button" title="Attach image">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19
                       a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <textarea
            id="message-input"
            placeholder="Message..."
            rows="1"
            autofocus
          ></textarea>
          <button id="send-btn" title="Send (Enter)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
          <button id="stop-btn" title="Stop generating" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="currentColor" stroke="none">
              <rect x="5" y="5" width="14" height="14" rx="2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    </div>
  </div>

  <script src="/static/message.js"></script>
  <script src="/static/voice.js"></script>
</body>
</html>
