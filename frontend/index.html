<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <header>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="var(--accent)" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <h1>Assistant</h1>
    <span id="voice-status"></span>
    <button id="new-chat-btn" title="Start a fresh chat session">New Chat</button>
    <button id="mic-btn" title="Toggle voice (say &quot;Computer,&quot; to activate)">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </header>

  <div id="app-shell">
    <aside id="sidebar">
      <section class="panel">
        <div class="panel-header">
          <h2>Sessions</h2>
          <button id="session-new-btn" class="panel-btn" title="Create a new session">New</button>
        </div>
        <div id="session-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Memory</h2>
          <button id="memory-clear-btn" class="panel-btn danger" title="Clear all memory">Clear</button>
        </div>
        <div id="memory-list" class="list"></div>
      </section>
    </aside>

    <div id="chat-column">
      <div id="messages">
        <div id="messages-inner">
          <div id="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.4"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <span>Start a conversation</span>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div id="input-inner">
          <textarea
            id="message-input"
            placeholder="Message..."
            rows="1"
            autofocus
          ></textarea>
          <button id="send-btn" title="Send (Enter)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/message.js"></script>
  <script src="/voice.js"></script>
</body>
</html>
