# MPD configuration — Phase 8 music playback
#
# Music files are mounted at /music from the host MUSIC_PATH.
# Audio output uses PulseAudio (compatible with PipeWire-PulseAudio layer).
#
# If your UID is not 1000, update the PulseAudio socket path below and in
# docker-compose.yml. Run `id -u` to check.
#
# To use ALSA instead of PulseAudio, comment the pulse block and add:
#   audio_output {
#       type    "alsa"
#       name    "ALSA"
#       device  "hw:0,0"
#   }

music_directory     "/music"
playlist_directory  "/config/playlists"
db_file             "/config/mpd.db"
log_file            "/config/mpd.log"
pid_file            "/config/mpd.pid"
state_file          "/config/mpdstate"
sticker_file        "/config/sticker.sql"

bind_to_address     "0.0.0.0"
port                "6600"

# Rebuild the database on startup if the music directory has changed.
auto_update         "yes"

audio_output {
    type    "pulse"
    name    "PulseAudio / PipeWire"
    server  "unix:/run/user/1000/pulse/native"
}
