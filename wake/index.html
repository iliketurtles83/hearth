<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wake Word Demo</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    #mic-btn {
      width: 64px; height: 64px; border-radius: 50%; border: 2px solid #555;
      background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #mic-btn.state-sleeping { border-color: #4caf50; background: #e8f5e9; }
    #mic-btn.state-recording { border-color: #f44336; background: #ffebee; }
    #mic-btn.state-transcribing { border-color: #ff9800; background: #fff3e0; }
    #voice-status { margin-top: 0.5rem; font-size: 0.85rem; color: #555; height: 1.2em; }
    #result { margin-top: 1.5rem; font-size: 1.1rem; max-width: 480px; text-align: center; }
  </style>
</head>
<body>
  <h1>Wake Word Demo</h1>
  <p>Say <strong>"Computer"</strong> to activate, then speak your message.</p>

  <button id="mic-btn" title="Toggle voice (say &quot;Computer&quot; to activate)">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
         width="28" height="28">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <span id="voice-status"></span>

  <div id="result"></div>

  <script>
    // Called by voice.js after a successful transcription.
    window.onTranscription = (text) => {
      document.getElementById('result').textContent = text;
    };
  </script>
  <!--
    audio-processor.js must be served at /audio-processor.js (same origin).
    The AudioWorklet API requires the module to be fetched from a server —
    it cannot be loaded from the filesystem directly.
  -->
  <script src="/voice.js"></script>
</body>
</html>
