name: Review Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changed-files-fast-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run changed-files fast tests
        run: |
          bash scripts/review_changed_tests.sh --base origin/main

  backend-review-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit bandit

      - name: Focused backend regression suite
        run: |
          pytest \
            backend/tests/test_auth.py \
            backend/tests/test_router.py \
            backend/tests/test_graph.py \
            backend/tests/test_memory_isolation.py \
            backend/tests/test_code_tool.py \
            backend/tests/test_weather.py \
            -q

      - name: Dependency vulnerability audit
        run: |
          pip-audit -r backend/requirements.txt --progress-spinner off

      - name: Static security scan
        run: |
          bandit -q -ll -r backend -x backend/tests,backend/.venv,backend/chroma,backend/models,backend/__pycache__
